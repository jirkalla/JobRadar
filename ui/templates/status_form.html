{% extends "base.html" %}

{% block title %}Record Outcome — {{ job.company }} | JobRadar{% endblock %}

{% block content %}

<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="/jobs">Jobs</a></li>
    <li class="breadcrumb-item"><a href="/jobs/{{ job.id }}">{{ job.company }}</a></li>
    <li class="breadcrumb-item active" aria-current="page">Record Outcome</li>
  </ol>
</nav>

<h1 class="h5 mb-1">Record Outcome</h1>
<p class="text-muted mb-4 small">{{ job.company }} — {{ job.role_title }}</p>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post" action="/jobs/{{ job.id }}/status" class="col-md-6">
  <input type="hidden" name="action" value="outcome">

  <div class="mb-3">
    <label for="reply_type" class="form-label fw-semibold">Outcome type <span class="text-danger">*</span></label>
    <select id="reply_type" name="reply_type" class="form-select" required>
      <option value="" disabled selected>— select —</option>
      <option value="no_reply">No reply</option>
      <option value="rejection">Rejection</option>
      <option value="positive">Positive response</option>
      <option value="interview">Interview</option>
      <option value="offer">Offer</option>
    </select>
  </div>

  <div class="mb-3">
    <label for="reply_date" class="form-label fw-semibold">Date of reply <span class="text-muted fw-normal">(optional)</span></label>
    <input id="reply_date" name="reply_date" type="date" class="form-control">
  </div>

  <div class="mb-4">
    <label for="notes" class="form-label fw-semibold">Notes <span class="text-muted fw-normal">(optional)</span></label>
    <textarea id="notes" name="notes" rows="3" class="form-control"
              placeholder="e.g. recruiter name, next steps…"></textarea>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">
      <i class="bi bi-check-circle"></i> Save Outcome
    </button>
    <a href="/jobs/{{ job.id }}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>

{% endblock %}
