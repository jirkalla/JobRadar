{% extends "base.html" %}

{% block title %}Profile — JobRadar{% endblock %}

{% block content %}
<h4 class="mb-3"><i class="bi bi-person-gear"></i> Profile</h4>

{% if msg %}
<div class="alert alert-success py-2">{{ msg }}</div>
{% endif %}

<form method="post" action="/profile" class="row g-3" style="max-width: 600px;">

  <h6 class="col-12 text-muted mb-0">Personal</h6>

  <div class="col-md-6">
    <label for="p-name" class="form-label small mb-1">Name</label>
    <input id="p-name" type="text" name="name" value="{{ profile.personal.name }}"
           class="form-control form-control-sm" required>
  </div>
  <div class="col-md-6">
    <label for="p-email" class="form-label small mb-1">Email</label>
    <input id="p-email" type="email" name="email" value="{{ profile.personal.email }}"
           class="form-control form-control-sm" required>
  </div>

  <h6 class="col-12 text-muted mb-0 mt-2">Preferences</h6>

  <div class="col-md-4">
    <label for="p-score" class="form-label small mb-1">Min score to show</label>
    <input id="p-score" type="number" name="min_score_to_show" min="1" max="10"
           value="{{ profile.preferences.min_score_to_show }}"
           class="form-control form-control-sm" required>
  </div>
  <div class="col-md-8">
    <label for="p-cities" class="form-label small mb-1">Hybrid cities (comma-separated)</label>
    <input id="p-cities" type="text" name="hybrid_cities" value="{{ hybrid_cities_str }}"
           class="form-control form-control-sm" placeholder="Berlin, Potsdam">
  </div>

  <h6 class="col-12 text-muted mb-0 mt-2">AI</h6>

  <div class="col-md-4">
    <label for="p-provider" class="form-label small mb-1">Provider</label>
    <select id="p-provider" name="provider" class="form-select form-select-sm">
      {% for opt in ['gemini', 'claude', 'openai'] %}
      <option value="{{ opt }}" {% if profile.ai.provider == opt %}selected{% endif %}>{{ opt }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-8">
    <label for="p-model" class="form-label small mb-1">Model</label>
    <input id="p-model" type="text" name="model" value="{{ profile.ai.model }}"
           class="form-control form-control-sm" required>
  </div>

  <div class="col-12 mt-2">
    <button type="submit" class="btn btn-primary btn-sm">
      <i class="bi bi-floppy"></i> Save
    </button>
  </div>

</form>
{% endblock %}
