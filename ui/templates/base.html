<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}JobRadar{% endblock %}</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-radar"></i> JobRadar</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navMenu" aria-controls="navMenu"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/jobs"><i class="bi bi-briefcase"></i> Jobs</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/history"><i class="bi bi-clock-history"></i> History</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/report"><i class="bi bi-file-earmark-bar-graph"></i> Report</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/profile"><i class="bi bi-person-circle"></i> Profile</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid mt-3">

  {% set msg = request.query_params.get('msg') %}
  {% if msg %}
  <div class="alert alert-success alert-dismissible fade show" role="alert">
    {{ msg }}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  {% endif %}

  {% block content %}{% endblock %}

</div>

<script src="/static/bootstrap.bundle.min.js"></script>
</body>
</html>
